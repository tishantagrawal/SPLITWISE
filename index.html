<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SplitSmart — Split expenses with friends</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0C0C10;
    --bg2: #13131A;
    --bg3: #1C1C28;
    --bg4: #252535;
    --border: #2A2A3E;
    --border2: #333348;
    --text: #F0EDE8;
    --text2: #A09DAA;
    --text3: #666680;
    --accent: #E07A5F;
    --accent2: #81B29A;
    --warn: #F2CC8F;
    --danger: #C0392B;
    --font-display: 'DM Serif Display', serif;
    --font-body: 'Sora', sans-serif;
  }
  html { scroll-behavior: smooth; }
  body { font-family: var(--font-body); background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
  ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: var(--bg2); } ::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 2px; }

  /* LAYOUT */
  .page { display: none; max-width: 500px; margin: 0 auto; padding: 20px 16px 80px; animation: fadeUp .35s cubic-bezier(.22,1,.36,1); }
  .page.active { display: block; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

  /* NAV */
  .topbar { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
  .back-btn { background: var(--bg3); border: 1px solid var(--border); color: var(--text2); padding: 9px 16px; border-radius: 10px; font-size: 13px; font-family: var(--font-body); cursor: pointer; transition: all .2s; font-weight: 600; }
  .back-btn:hover { background: var(--bg4); color: var(--text); }
  .page-title { font-family: var(--font-display); font-size: 26px; color: var(--text); }

  /* CARDS */
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; }
  .card-pad { padding: 20px; }

  /* FORM */
  label.lbl { font-size: 11px; color: var(--text3); font-weight: 700; letter-spacing: .8px; text-transform: uppercase; display: block; margin-bottom: 7px; margin-top: 18px; }
  label.lbl:first-child { margin-top: 0; }
  input[type=text], input[type=number], input[type=date], select, textarea {
    width: 100%; background: var(--bg4); border: 1px solid var(--border2); border-radius: 10px;
    padding: 12px 14px; color: var(--text); font-size: 14px; font-family: var(--font-body);
    outline: none; transition: border .2s;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  select option { background: var(--bg3); }

  /* BUTTONS */
  .btn { cursor: pointer; border: none; font-family: var(--font-body); transition: all .18s; }
  .btn:hover { filter: brightness(1.12); transform: translateY(-1px); }
  .btn:active { transform: translateY(0); filter: brightness(.95); }
  .btn-primary { background: var(--accent); color: #fff; padding: 14px; border-radius: 12px; font-weight: 700; font-size: 15px; width: 100%; }
  .btn-secondary { background: var(--bg4); border: 1px solid var(--border2); color: var(--text); padding: 11px 18px; border-radius: 10px; font-weight: 600; font-size: 13px; }
  .btn-success { background: #81B29A22; border: 1px solid #81B29A55; color: var(--accent2); padding: 11px; border-radius: 10px; font-weight: 700; font-size: 13px; width: 100%; }
  .btn-danger { background: transparent; border: 1px solid #C0392B44; color: var(--danger); padding: 11px; border-radius: 10px; font-weight: 600; font-size: 13px; width: 100%; }
  .btn-icon { background: var(--bg4); border: 1px solid var(--border); color: var(--text2); padding: 6px 12px; border-radius: 8px; font-size: 11px; font-weight: 600; }

  /* CHIPS */
  .chip-row { display: flex; flex-wrap: wrap; gap: 7px; }
  .chip { background: var(--bg4); border: 1px solid var(--border2); border-radius: 8px; padding: 7px 13px; font-size: 12px; cursor: pointer; transition: all .15s; font-family: var(--font-body); color: var(--text2); font-weight: 600; }
  .chip:hover { background: var(--bg3); }
  .chip.active { background: rgba(224,122,95,.15); border-color: var(--accent); color: var(--accent); }

  /* AVATARS */
  .avatar { border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; color: #fff; flex-shrink: 0; }

  /* TAGS */
  .tag-pos { background: rgba(129,178,154,.15); color: var(--accent2); border: 1px solid rgba(129,178,154,.3); padding: 2px 9px; border-radius: 20px; font-size: 11px; font-weight: 700; }
  .tag-neg { background: rgba(224,122,95,.15); color: var(--accent); border: 1px solid rgba(224,122,95,.3); padding: 2px 9px; border-radius: 20px; font-size: 11px; font-weight: 700; }

  /* DIVIDER */
  hr { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

  /* NOTIFICATION */
  #notif { position: fixed; top: 18px; right: 18px; z-index: 9999; padding: 12px 20px; border-radius: 12px; font-weight: 700; font-size: 13px; box-shadow: 0 10px 40px rgba(0,0,0,.5); transition: all .3s; transform: translateY(-10px); opacity: 0; pointer-events: none; font-family: var(--font-body); }
  #notif.show { transform: translateY(0); opacity: 1; }
  #notif.success { background: #27AE60; color: #fff; }
  #notif.error { background: var(--danger); color: #fff; }

  /* MODAL OVERLAY */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 500; align-items: flex-end; justify-content: center; backdrop-filter: blur(4px); }
  .modal-overlay.open { display: flex; }
  .modal-box { background: var(--bg2); border: 1px solid var(--border); border-radius: 20px 20px 0 0; padding: 28px 20px; width: 100%; max-width: 500px; animation: slideModal .3s cubic-bezier(.22,1,.36,1); max-height: 90vh; overflow-y: auto; }
  @keyframes slideModal { from { transform: translateY(100%); } to { transform: translateY(0); } }

  /* SCROLLABLE ROW */
  .scroll-row { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; }
  .scroll-row::-webkit-scrollbar { height: 0; }

  /* MISC */
  .flex-between { display: flex; justify-content: space-between; align-items: center; }
  .flex-center { display: flex; align-items: center; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .section-label { font-size: 11px; color: var(--text3); font-weight: 700; letter-spacing: .8px; text-transform: uppercase; margin-bottom: 10px; }
  .empty-state { padding: 40px; text-align: center; color: var(--text3); font-size: 14px; }
  .empty-state .icon { font-size: 44px; margin-bottom: 12px; }

  /* PROGRESS BAR */
  .progress-track { background: var(--bg4); border-radius: 4px; height: 5px; overflow: hidden; margin-top: 8px; }
  .progress-fill { height: 100%; border-radius: 4px; transition: width .6s ease; }

  /* GROUP CARD */
  .group-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 18px 20px; margin-bottom: 10px; cursor: pointer; transition: all .2s; }
  .group-card:hover { border-color: rgba(224,122,95,.4); background: var(--bg3); transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,.3); }

  /* EXPENSE ITEM */
  .exp-item { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 15px 16px; margin-bottom: 8px; }

  /* SETTLE CARD */
  .settle-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 20px; margin-bottom: 10px; }

  /* STAT BOX */
  .stat-box { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 14px 12px; text-align: center; }

  /* MEMBER TAG */
  .member-tag { display: flex; align-items: center; gap: 8px; background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 8px 12px; }
</style>
</head>
<body>

<!-- NOTIFICATION -->
<div id="notif"></div>

<!-- ===== HOME PAGE ===== -->
<div class="page active" id="page-home">
  <div style="text-align:center; padding: 36px 0 28px;">
    <div style="font-size:52px; margin-bottom:10px;">💸</div>
    <h1 style="font-family:var(--font-display); font-size:38px; letter-spacing:-1px;">SplitSmart</h1>
    <p style="color:var(--text3); font-size:13px; margin-top:6px;">Split trip expenses with friends, stress-free</p>
  </div>

  <div class="flex-between" style="margin-bottom:14px;">
    <span class="section-label" style="margin-bottom:0;">Your Groups</span>
    <button class="btn btn-secondary" onclick="openPage('add-group')" style="padding:9px 16px; background:var(--accent); border-color:var(--accent); color:#fff; font-size:13px;">+ New Group</button>
  </div>

  <div id="groups-list"></div>
</div>

<!-- ===== ADD GROUP PAGE ===== -->
<div class="page" id="page-add-group">
  <div class="topbar">
    <button class="btn back-btn" onclick="openPage('home')">← Back</button>
    <h2 class="page-title">New Group</h2>
  </div>
  <div class="card card-pad">
    <label class="lbl">Group Name</label>
    <input type="text" id="new-group-name" placeholder="e.g. Goa Trip, Weekend Getaway..." />
    <label class="lbl" style="margin-top:18px;">Pick an Emoji</label>
    <div class="chip-row" id="emoji-picker" style="margin-top:8px;"></div>
    <button class="btn btn-primary" onclick="createGroup()" style="margin-top:24px;">Create Group</button>
  </div>
</div>

<!-- ===== GROUP DETAIL PAGE ===== -->
<div class="page" id="page-group">
  <div class="topbar">
    <button class="btn back-btn" onclick="openPage('home')">← Back</button>
    <div>
      <div style="font-family:var(--font-display); font-size:22px;" id="grp-title">Group</div>
      <div style="color:var(--text3); font-size:11px;" id="grp-subtitle"></div>
    </div>
  </div>

  <!-- Stats -->
  <div class="grid-3" style="margin-bottom:14px;" id="grp-stats"></div>

  <!-- Members -->
  <div class="card card-pad" style="margin-bottom:12px;">
    <div class="flex-between" style="margin-bottom:12px;">
      <span style="font-size:13px; font-weight:700; color:var(--text2);">👥 Members</span>
      <button class="btn btn-icon" onclick="openPage('add-member')">+ Add</button>
    </div>
    <div id="members-list" class="chip-row"></div>
  </div>

  <!-- Action buttons -->
  <div style="display:flex; gap:8px; margin-bottom:12px;">
    <button class="btn btn-primary" onclick="openAddExpense()" style="flex:2; padding:13px;">+ Add Expense</button>
    <button class="btn btn-secondary" onclick="openPage('balances')" style="flex:1; padding:13px; font-size:12px;">Balances</button>
    <button class="btn btn-secondary" onclick="openPage('settle')" style="flex:1; padding:13px; font-size:12px;">Settle Up</button>
  </div>

  <!-- Filter -->
  <div class="scroll-row" id="cat-filter" style="margin-bottom:12px;"></div>

  <!-- Expenses -->
  <div class="section-label">Expenses</div>
  <div id="expenses-list"></div>

  <!-- Danger -->
  <div style="margin-top:28px; padding-top:20px; border-top:1px solid var(--border);">
    <button class="btn btn-danger" onclick="deleteGroup()">🗑️ Delete This Group</button>
  </div>
</div>

<!-- ===== ADD MEMBER PAGE ===== -->
<div class="page" id="page-add-member">
  <div class="topbar">
    <button class="btn back-btn" onclick="openPage('group')">← Back</button>
    <h2 class="page-title">Add Members</h2>
  </div>
  <div class="card card-pad">
    <label class="lbl">Member Name</label>
    <div style="display:flex; gap:10px;">
      <input type="text" id="new-member-name" placeholder="Enter name..." onkeydown="if(event.key==='Enter') addMember()" />
      <button class="btn btn-primary" onclick="addMember()" style="width:auto; padding:12px 20px;">Add</button>
    </div>
    <hr />
    <div class="section-label">Current Members</div>
    <div id="members-detail-list"></div>
  </div>
</div>

<!-- ===== ADD / EDIT EXPENSE PAGE ===== -->
<div class="page" id="page-add-expense">
  <div class="topbar">
    <button class="btn back-btn" onclick="openPage('group')">← Back</button>
    <h2 class="page-title" id="exp-page-title">Add Expense</h2>
  </div>
  <div class="card card-pad">
    <label class="lbl">Category</label>
    <div class="chip-row" id="cat-picker" style="margin-bottom:4px;"></div>

    <label class="lbl">Description</label>
    <input type="text" id="exp-desc" placeholder="What was this for?" />

    <label class="lbl">Amount (₹)</label>
    <input type="number" id="exp-amount" placeholder="0.00" oninput="onAmountChange()" style="font-size:22px; font-weight:800; color:var(--accent);" />

    <label class="lbl">Date</label>
    <input type="date" id="exp-date" />

    <label class="lbl">Paid By</label>
    <select id="exp-paidby"></select>

    <label class="lbl">Split Type</label>
    <div style="display:flex; gap:8px; margin-bottom:4px;">
      <button class="btn chip active" id="split-eq-btn" onclick="setSplitMode('equal')" style="flex:1; padding:10px;">⚖️ Equal Split</button>
      <button class="btn chip" id="split-cu-btn" onclick="setSplitMode('custom')" style="flex:1; padding:10px;">✏️ Custom</button>
    </div>

    <div id="custom-splits" style="display:none; background:var(--bg4); border-radius:12px; padding:14px; margin-top:10px;">
      <div class="section-label" style="margin-bottom:10px;">Select who shares this expense</div>
      <div id="custom-split-inputs"></div>
      <div style="border-top:1px solid var(--border); padding-top:12px; margin-top:8px; display:flex; justify-content:space-between; align-items:center;">
        <span style="font-size:11px; color:var(--text3); font-weight:600;">Each person pays</span>
        <span id="per-person-display" style="font-weight:800; font-size:16px; color:var(--accent2);">₹0</span>
      </div>
    </div>

    <button class="btn btn-primary" onclick="saveExpense()" style="margin-top:22px;" id="save-exp-btn">✅ Add Expense</button>
  </div>
</div>

<!-- ===== BALANCES PAGE ===== -->
<div class="page" id="page-balances">
  <div class="topbar">
    <button class="btn back-btn" onclick="openPage('group')">← Back</button>
    <h2 class="page-title">💰 Balances</h2>
  </div>
  <div class="section-label">Individual Balances</div>
  <div id="balances-list"></div>
  <div id="settlement-history-section" style="margin-top:20px;"></div>
</div>

<!-- ===== SETTLE UP PAGE ===== -->
<div class="page" id="page-settle">
  <div class="topbar">
    <button class="btn back-btn" onclick="openPage('group')">← Back</button>
    <h2 class="page-title">🤝 Settle Up</h2>
  </div>
  <div id="settle-list"></div>
</div>

<!-- ===== MODALS ===== -->
<div class="modal-overlay" id="confirm-modal">
  <div class="modal-box">
    <h3 style="font-family:var(--font-display); font-size:22px; margin-bottom:10px;" id="modal-title">Confirm</h3>
    <p style="color:var(--text2); font-size:14px; margin-bottom:20px;" id="modal-body">Are you sure?</p>
    <div style="display:flex; gap:10px;">
      <button class="btn btn-secondary" onclick="closeModal()" style="flex:1;">Cancel</button>
      <button class="btn btn-primary" id="modal-confirm-btn" style="flex:1; background:var(--danger);">Delete</button>
    </div>
  </div>
</div>

<script>
// ===================== DATA LAYER =====================
const STORAGE_KEY = 'splitsmart_v2';
const COLORS = ['#E07A5F','#3D405B','#81B29A','#F2CC8F','#6B9AC4','#C9A96E','#7C6BAF','#E76F51','#2EC4B6','#FF6B6B'];
const EMOJIS = ['✈️','🏖️','🏔️','🎉','🏕️','🚗','🍻','🎒','🌍','🎪','🎆','🚂'];
const CATEGORIES = ['🍽️','🏨','🚗','✈️','🛵','🎉','🛒','⛽','🎢','🏊','🍻','💊','📦','Other'];

let state = { groups: [], activeGroupId: null, activePage: 'home' };

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) state = JSON.parse(raw);
  } catch(e) {}
  if (!state.groups) state.groups = [];
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function getGroup(id) { return state.groups.find(g => g.id === (id || state.activeGroupId)); }
function getMember(gid, mid) { return getGroup(gid)?.members.find(m => m.id === mid); }
function getMemberName(mid) { return getGroup()?.members.find(m => m.id === mid)?.name || mid; }

// ===================== NAVIGATION =====================
function openPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const el = document.getElementById('page-' + page);
  if (el) {
    el.classList.add('active');
    state.activePage = page;
    window.scrollTo(0, 0);
  }
  renderPage(page);
}

function renderPage(page) {
  if (page === 'home') renderHome();
  if (page === 'group') renderGroupDetail();
  if (page === 'add-member') renderAddMember();
  if (page === 'balances') renderBalances();
  if (page === 'settle') renderSettle();
}

// ===================== NOTIFICATION =====================
function notify(msg, type='success') {
  const el = document.getElementById('notif');
  el.textContent = (type === 'success' ? '✅ ' : '⚠️ ') + msg;
  el.className = `show ${type}`;
  clearTimeout(el._t);
  el._t = setTimeout(() => el.className = '', 2800);
}

// ===================== MODAL =====================
let modalCallback = null;
function openModal(title, body, cb) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').textContent = body;
  modalCallback = cb;
  document.getElementById('confirm-modal').classList.add('open');
  document.getElementById('modal-confirm-btn').onclick = () => { closeModal(); if(modalCallback) modalCallback(); };
}
function closeModal() { document.getElementById('confirm-modal').classList.remove('open'); }
document.getElementById('confirm-modal').addEventListener('click', e => { if(e.target === e.currentTarget) closeModal(); });

// ===================== HOME =====================
function renderHome() {
  const list = document.getElementById('groups-list');
  if (!state.groups.length) {
    list.innerHTML = `<div class="card"><div class="empty-state"><div class="icon">🌍</div>No groups yet. Create your first trip!</div></div>`;
    return;
  }
  list.innerHTML = state.groups.map(g => {
    const total = g.expenses.reduce((s, e) => s + e.amount, 0);
    const bals = computeBalances(g);
    const txns = simplifyDebts(bals);
    const avatars = g.members.slice(0,5).map((m,i) =>
      `<div class="avatar" style="width:26px;height:26px;font-size:10px;background:${COLORS[i%COLORS.length]};border:2px solid var(--bg2);margin-right:-4px;">${m.name[0].toUpperCase()}</div>`
    ).join('');
    return `<div class="group-card" onclick="openGroup('${g.id}')">
      <div class="flex-between">
        <div>
          <div style="font-size:26px;margin-bottom:5px;">${g.emoji}</div>
          <div style="font-weight:700;font-size:17px;">${escHtml(g.name)}</div>
          <div style="color:var(--text3);font-size:12px;margin-top:3px;">${g.members.length} members · ${g.expenses.length} expenses</div>
        </div>
        <div style="text-align:right;">
          <div style="font-weight:800;font-size:20px;color:var(--accent);">₹${total.toLocaleString('en-IN')}</div>
          <div style="font-size:11px;margin-top:3px;color:${txns.length?'#F2CC8F':'var(--accent2)'};">${txns.length ? txns.length+' pending' : '✓ settled'}</div>
        </div>
      </div>
      ${g.members.length ? `<div style="display:flex;margin-top:14px;">${avatars}${g.members.length>5?`<div class="avatar" style="width:26px;height:26px;font-size:10px;background:var(--bg4);color:var(--text3);">+${g.members.length-5}</div>`:''}` : ''}
    </div>`;
  }).join('');
}

// ===================== CREATE GROUP =====================
function initEmojiPicker() {
  const container = document.getElementById('emoji-picker');
  let selected = EMOJIS[0];
  container.innerHTML = EMOJIS.map(e =>
    `<button class="btn chip ${e===selected?'active':''}" onclick="selectEmoji('${e}',this)">${e}</button>`
  ).join('');
}
function selectEmoji(e, btn) {
  document.querySelectorAll('#emoji-picker .chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}
function getSelectedEmoji() {
  const active = document.querySelector('#emoji-picker .chip.active');
  return active ? active.textContent : '✈️';
}
function createGroup() {
  const name = document.getElementById('new-group-name').value.trim();
  if (!name) { notify('Enter a group name', 'error'); return; }
  const g = { id: 'g'+Date.now(), name, emoji: getSelectedEmoji(), members: [], expenses: [], settlements: [] };
  state.groups.push(g);
  state.activeGroupId = g.id;
  saveState();
  document.getElementById('new-group-name').value = '';
  notify('Group created!');
  openPage('group');
}
function openGroup(id) {
  state.activeGroupId = id;
  openPage('group');
}

// ===================== GROUP DETAIL =====================
function renderGroupDetail() {
  const g = getGroup();
  if (!g) return;
  document.getElementById('grp-title').textContent = g.emoji + ' ' + g.name;
  document.getElementById('grp-subtitle').textContent = g.members.length + ' members';

  const total = g.expenses.reduce((s,e) => s+e.amount, 0);
  const bals = computeBalances(g);
  const txns = simplifyDebts(bals);
  document.getElementById('grp-stats').innerHTML = [
    { label: 'Total Spent', val: '₹'+total.toLocaleString('en-IN'), color: 'var(--accent)' },
    { label: 'Expenses', val: g.expenses.length, color: 'var(--accent2)' },
    { label: 'Pending', val: txns.length, color: txns.length ? 'var(--warn)' : 'var(--accent2)' },
  ].map(s => `<div class="stat-box"><div style="font-weight:800;font-size:20px;color:${s.color};">${s.val}</div><div style="font-size:10px;color:var(--text3);margin-top:3px;">${s.label}</div></div>`).join('');

  // Members
  const ml = document.getElementById('members-list');
  if (!g.members.length) { ml.innerHTML = `<span style="color:var(--text3);font-size:13px;">No members yet.</span>`; }
  else {
    ml.innerHTML = g.members.map((m,i) => {
      const b = bals[m.id] || 0;
      return `<div class="member-tag">
        <div class="avatar" style="width:28px;height:28px;font-size:11px;background:${COLORS[i%COLORS.length]};">${m.name[0].toUpperCase()}</div>
        <div>
          <div style="font-size:12px;font-weight:700;">${escHtml(m.name)}</div>
          <div style="font-size:10px;color:${b>=0?'var(--accent2)':'var(--accent)'};">${b>=0?'+':'-'}₹${Math.abs(b).toFixed(0)}</div>
        </div>
      </div>`;
    }).join('');
  }

  // Category filter
  const activeCat = state.activeFilterCat || 'All';
  document.getElementById('cat-filter').innerHTML = ['All',...CATEGORIES].map(c =>
    `<button class="btn chip ${c===activeCat?'active':''}" onclick="setFilter('${c}')">${c}</button>`
  ).join('');

  renderExpenses();
}

function setFilter(cat) {
  state.activeFilterCat = cat;
  renderGroupDetail();
}

function renderExpenses() {
  const g = getGroup(); if (!g) return;
  const cat = state.activeFilterCat || 'All';
  const list = g.expenses.filter(e => cat === 'All' || e.category === cat).slice().reverse();
  const el = document.getElementById('expenses-list');
  if (!list.length) { el.innerHTML = `<div class="card"><div class="empty-state"><div class="icon">📝</div>No expenses yet. Add one!</div></div>`; return; }
  el.innerHTML = list.map(exp => {
    const payer = g.members.find(m => m.id === exp.paidBy);
    const splits = Object.entries(exp.splits).map(([uid,amt]) => `${getMemberName(uid)} ₹${amt}`).join(' · ');
    return `<div class="exp-item">
      <div class="flex-between">
        <div style="display:flex;gap:12px;align-items:flex-start;flex:1;min-width:0;">
          <div style="font-size:28px;line-height:1;flex-shrink:0;">${exp.category}</div>
          <div style="min-width:0;">
            <div style="font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escHtml(exp.description)}</div>
            <div style="color:var(--text3);font-size:11px;margin-top:3px;">Paid by <span style="color:var(--accent);font-weight:700;">${escHtml(payer?.name||'?')}</span> · ${exp.date}</div>
            <div style="color:var(--text3);font-size:10px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${splits}</div>
          </div>
        </div>
        <div style="text-align:right;flex-shrink:0;margin-left:10px;">
          <div style="font-weight:800;font-size:17px;color:var(--accent);">₹${exp.amount.toLocaleString('en-IN')}</div>
          <div style="display:flex;gap:5px;margin-top:6px;justify-content:flex-end;">
            <button class="btn btn-icon" onclick="editExpense('${exp.id}')">Edit</button>
            <button class="btn btn-icon" onclick="confirmDeleteExpense('${exp.id}')" style="color:var(--accent);border-color:rgba(224,122,95,.3);">Del</button>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function deleteGroup() {
  openModal('Delete Group', 'This will permanently delete all expenses and members. This cannot be undone.', () => {
    state.groups = state.groups.filter(g => g.id !== state.activeGroupId);
    state.activeGroupId = null;
    saveState();
    notify('Group deleted');
    openPage('home');
  });
}

// ===================== MEMBERS =====================
function renderAddMember() {
  const g = getGroup(); if (!g) return;
  const el = document.getElementById('members-detail-list');
  if (!g.members.length) { el.innerHTML = `<div style="color:var(--text3);font-size:13px;">No members yet.</div>`; return; }
  el.innerHTML = g.members.map((m,i) => `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
      <div class="avatar" style="width:32px;height:32px;font-size:13px;background:${COLORS[i%COLORS.length]};">${m.name[0].toUpperCase()}</div>
      <span style="flex:1;font-size:14px;font-weight:600;">${escHtml(m.name)}</span>
      <button class="btn btn-icon" onclick="removeMember('${m.id}')" style="color:var(--accent);border-color:rgba(224,122,95,.3);">Remove</button>
    </div>`).join('');
}
function addMember() {
  const input = document.getElementById('new-member-name');
  const name = input.value.trim();
  if (!name) return;
  const g = getGroup(); if (!g) return;
  g.members.push({ id: 'm'+Date.now(), name });
  saveState();
  input.value = '';
  notify(`${name} added!`);
  renderAddMember();
}
function removeMember(mid) {
  const g = getGroup(); if (!g) return;
  const m = g.members.find(x => x.id === mid);
  openModal('Remove Member', `Remove ${m?.name}? Their share of expenses won't be recalculated.`, () => {
    g.members = g.members.filter(x => x.id !== mid);
    saveState();
    notify('Member removed');
    renderAddMember();
  });
}

// ===================== EXPENSE FORM =====================
let expForm = { editId: null, splitMode: 'equal', selectedCat: '🍽️', customSplits: {} };

function initCatPicker(container_id, current) {
  document.getElementById(container_id).innerHTML = CATEGORIES.map(c =>
    `<button class="btn chip ${c===current?'active':''}" onclick="selectCat('${c}',this,'${container_id}')">${c}</button>`
  ).join('');
}
function selectCat(cat, btn, containerId) {
  document.querySelectorAll(`#${containerId} .chip`).forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  expForm.selectedCat = cat;
}

function openAddExpense() {
  const g = getGroup(); if (!g) return;
  const g0 = getGroup();
  expForm = { editId: null, splitMode: 'equal', selectedCat: '🍽️', checkedMembers: g0?.members.map(m=>m.id) || [] };
  document.getElementById('exp-page-title').textContent = 'Add Expense';
  document.getElementById('exp-desc').value = '';
  document.getElementById('exp-amount').value = '';
  document.getElementById('exp-date').value = new Date().toISOString().split('T')[0];
  document.getElementById('save-exp-btn').textContent = '✅ Add Expense';
  initCatPicker('cat-picker', '🍽️');
  populatePaidBy(g.members[0]?.id || '');
  setSplitMode('equal');
  openPage('add-expense');
}

function editExpense(expId) {
  const g = getGroup(); if (!g) return;
  const exp = g.expenses.find(e => e.id === expId); if (!exp) return;
  // Members who had a non-zero split
  const checkedMembers = Object.entries(exp.splits).filter(([,amt])=>amt>0).map(([uid])=>uid);
  expForm = { editId: expId, splitMode: 'custom', selectedCat: exp.category, checkedMembers };
  document.getElementById('exp-page-title').textContent = 'Edit Expense';
  document.getElementById('exp-desc').value = exp.description;
  document.getElementById('exp-amount').value = exp.amount;
  document.getElementById('exp-date').value = exp.date;
  document.getElementById('save-exp-btn').textContent = '💾 Update Expense';
  initCatPicker('cat-picker', exp.category);
  populatePaidBy(exp.paidBy);
  setSplitMode('custom');
  openPage('add-expense');
}

function populatePaidBy(selectedId) {
  const g = getGroup(); if (!g) return;
  document.getElementById('exp-paidby').innerHTML = g.members.map(m =>
    `<option value="${m.id}" ${m.id===selectedId?'selected':''}>${escHtml(m.name)}</option>`
  ).join('');
}

function setSplitMode(mode) {
  expForm.splitMode = mode;
  document.getElementById('split-eq-btn').classList.toggle('active', mode === 'equal');
  document.getElementById('split-cu-btn').classList.toggle('active', mode === 'custom');
  document.getElementById('custom-splits').style.display = mode === 'custom' ? 'block' : 'none';
  if (mode === 'custom') {
    // Default: all members checked
    const g = getGroup(); if (!g) return;
    if (!expForm.checkedMembers || expForm.checkedMembers.length === 0)
      expForm.checkedMembers = g.members.map(m => m.id);
    renderCheckboxSplits();
  }
}

function renderCheckboxSplits() {
  const g = getGroup(); if (!g) return;
  const total = parseFloat(document.getElementById('exp-amount').value) || 0;
  const checked = expForm.checkedMembers || [];
  const perPerson = checked.length > 0 ? (total / checked.length) : 0;

  document.getElementById('custom-split-inputs').innerHTML = g.members.map((m, i) => {
    const isChecked = checked.includes(m.id);
    return `
    <div onclick="toggleMemberCheck('${m.id}')" style="display:flex;align-items:center;gap:12px;padding:10px 12px;margin-bottom:7px;border-radius:10px;cursor:pointer;transition:all .15s;background:${isChecked ? 'rgba(129,178,154,0.1)' : 'var(--bg3)'};border:1.5px solid ${isChecked ? 'var(--accent2)' : 'var(--border2)'};">
      <div style="width:20px;height:20px;border-radius:6px;border:2px solid ${isChecked ? 'var(--accent2)' : 'var(--border2)'};background:${isChecked ? 'var(--accent2)' : 'transparent'};display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;">
        ${isChecked ? '<span style="color:#fff;font-size:12px;font-weight:900;">✓</span>' : ''}
      </div>
      <div class="avatar" style="width:28px;height:28px;font-size:11px;background:${COLORS[i % COLORS.length]};">${m.name[0].toUpperCase()}</div>
      <span style="flex:1;font-size:13px;font-weight:600;color:${isChecked ? 'var(--text)' : 'var(--text3)'};">${escHtml(m.name)}</span>
      <span style="font-size:13px;font-weight:700;color:${isChecked ? 'var(--accent2)' : 'var(--text3)'};">${isChecked && total > 0 ? '₹' + perPerson.toFixed(2) : '—'}</span>
    </div>`;
  }).join('');

  const ppEl = document.getElementById('per-person-display');
  if (ppEl) ppEl.textContent = checked.length > 0 && total > 0 ? `₹${perPerson.toFixed(2)}` : '₹0';
}

function toggleMemberCheck(mid) {
  if (!expForm.checkedMembers) expForm.checkedMembers = [];
  const idx = expForm.checkedMembers.indexOf(mid);
  if (idx === -1) expForm.checkedMembers.push(mid);
  else {
    if (expForm.checkedMembers.length === 1) return; // keep at least 1 checked
    expForm.checkedMembers.splice(idx, 1);
  }
  renderCheckboxSplits();
}

function onAmountChange() {
  if (expForm.splitMode === 'custom') renderCheckboxSplits();
}

function saveExpense() {
  const g = getGroup(); if (!g) return;
  const desc = document.getElementById('exp-desc').value.trim();
  const amount = parseFloat(document.getElementById('exp-amount').value);
  const date = document.getElementById('exp-date').value;
  const paidBy = document.getElementById('exp-paidby').value;
  if (!desc) { notify('Enter a description', 'error'); return; }
  if (!amount || amount <= 0) { notify('Enter a valid amount', 'error'); return; }
  if (!paidBy) { notify('Select who paid', 'error'); return; }
  const splits = expForm.splitMode === 'equal' ? (() => {
    const per = +(amount / g.members.length).toFixed(2);
    const s = {}; g.members.forEach(m => s[m.id] = per); return s;
  })() : (() => {
    const checked = expForm.checkedMembers || g.members.map(m=>m.id);
    if (!checked.length) { notify('Select at least one member', 'error'); return null; }
    const per = +(amount / checked.length).toFixed(2);
    const s = {}; checked.forEach(mid => s[mid] = per); return s;
  })();
  if (!splits) return;

  const exp = { id: expForm.editId || 'e'+Date.now(), description: desc, amount, date, paidBy, splits, category: expForm.selectedCat };
  if (expForm.editId) { g.expenses = g.expenses.map(e => e.id === expForm.editId ? exp : e); notify('Expense updated!'); }
  else { g.expenses.push(exp); notify('Expense added!'); }
  saveState();
  openPage('group');
}

function confirmDeleteExpense(expId) {
  const g = getGroup();
  const exp = g?.expenses.find(e => e.id === expId);
  openModal('Delete Expense', `Delete "${exp?.description}"? This cannot be undone.`, () => {
    g.expenses = g.expenses.filter(e => e.id !== expId);
    saveState();
    notify('Expense deleted');
    renderGroupDetail();
  });
}

// ===================== BALANCES =====================
function computeBalances(g) {
  const bal = {};
  g.members.forEach(m => bal[m.id] = 0);
  g.expenses.forEach(exp => {
    bal[exp.paidBy] = (bal[exp.paidBy]||0) + exp.amount;
    Object.entries(exp.splits).forEach(([uid,amt]) => bal[uid] = (bal[uid]||0) - amt);
  });
  (g.settlements||[]).forEach(s => { bal[s.from] = (bal[s.from]||0) - s.amount; bal[s.to] = (bal[s.to]||0) + s.amount; });
  return bal;
}

function simplifyDebts(balances) {
  const pos = [], neg = [];
  Object.entries(balances).forEach(([id,amt]) => {
    if (amt > 0.01) pos.push({id,amt}); else if (amt < -0.01) neg.push({id,amt:-amt});
  });
  pos.sort((a,b)=>b.amt-a.amt); neg.sort((a,b)=>b.amt-a.amt);
  const txns = [];
  let i=0, j=0;
  while (i<pos.length && j<neg.length) {
    const s = Math.min(pos[i].amt, neg[j].amt);
    txns.push({from:neg[j].id, to:pos[i].id, amount:s});
    pos[i].amt -= s; neg[j].amt -= s;
    if (pos[i].amt < 0.01) i++; if (neg[j].amt < 0.01) j++;
  }
  return txns;
}

function renderBalances() {
  const g = getGroup(); if (!g) return;
  const bals = computeBalances(g);
  const total = g.expenses.reduce((s,e)=>s+e.amount,0);
  const el = document.getElementById('balances-list');
  el.innerHTML = g.members.map((m,i) => {
    const b = bals[m.id]||0;
    const pos = b >= 0;
    const pct = total > 0 ? Math.min(Math.abs(b)/total*100,100) : 0;
    return `<div class="card card-pad" style="margin-bottom:10px;">
      <div class="flex-between" style="margin-bottom:8px;">
        <div style="display:flex;align-items:center;gap:12px;">
          <div class="avatar" style="width:36px;height:36px;font-size:14px;background:${COLORS[i%COLORS.length]};">${m.name[0].toUpperCase()}</div>
          <div>
            <div style="font-weight:700;font-size:15px;">${escHtml(m.name)}</div>
            <div style="font-size:11px;color:var(--text3);">${pos?'is owed money':'owes money'}</div>
          </div>
        </div>
        <div style="font-weight:900;font-size:22px;color:${pos?'var(--accent2)':'var(--accent)'};">${pos?'+':'-'}₹${Math.abs(b).toFixed(2)}</div>
      </div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%;background:${pos?'var(--accent2)':'var(--accent)'};"></div></div>
    </div>`;
  }).join('');

  const sh = document.getElementById('settlement-history-section');
  const settlements = g.settlements || [];
  if (!settlements.length) { sh.innerHTML = ''; return; }
  sh.innerHTML = `<div class="section-label">Settlement History</div>` +
    settlements.slice().reverse().map(s => `
      <div class="card card-pad" style="margin-bottom:8px;">
        <div class="flex-between">
          <div style="font-size:13px;">
            <span style="color:var(--accent);font-weight:700;">${escHtml(getMemberName(s.from))}</span>
            <span style="color:var(--text3);"> paid </span>
            <span style="color:var(--accent2);font-weight:700;">${escHtml(getMemberName(s.to))}</span>
            <div style="color:var(--text3);font-size:11px;margin-top:2px;">${s.date}</div>
          </div>
          <div style="font-weight:800;color:var(--accent2);font-size:16px;">₹${s.amount.toFixed(2)}</div>
        </div>
      </div>`).join('');
}

// ===================== SETTLE =====================
function renderSettle() {
  const g = getGroup(); if (!g) return;
  const bals = computeBalances(g);
  const txns = simplifyDebts(bals);
  const el = document.getElementById('settle-list');
  if (!txns.length) {
    el.innerHTML = `<div class="card"><div class="empty-state"><div class="icon">🎉</div><div style="font-weight:700;font-size:18px;color:var(--accent2);">All Settled!</div><div style="margin-top:8px;">No pending payments.</div></div></div>`;
    return;
  }
  const gMembers = g.members;
  const colorMap = {};
  gMembers.forEach((m,i) => colorMap[m.id] = COLORS[i%COLORS.length]);

  el.innerHTML = `<div class="section-label">${txns.length} payment${txns.length>1?'s':''} needed</div>` +
    txns.map((t,idx) => `
      <div class="settle-card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
          <div style="display:flex;align-items:center;gap:10px;">
            <div class="avatar" style="width:38px;height:38px;font-size:15px;background:${colorMap[t.from]||'var(--accent)'};">${getMemberName(t.from)[0].toUpperCase()}</div>
            <div><div style="font-weight:700;font-size:15px;">${escHtml(getMemberName(t.from))}</div><div style="color:var(--text3);font-size:11px;">should pay</div></div>
          </div>
          <div style="text-align:center;">
            <div style="font-weight:900;font-size:22px;color:var(--accent);">₹${t.amount.toFixed(2)}</div>
            <div style="font-size:18px;color:var(--text3);">→</div>
          </div>
          <div style="display:flex;align-items:center;gap:10px;">
            <div style="text-align:right;"><div style="font-weight:700;font-size:15px;">${escHtml(getMemberName(t.to))}</div><div style="color:var(--text3);font-size:11px;">gets paid</div></div>
            <div class="avatar" style="width:38px;height:38px;font-size:15px;background:${colorMap[t.to]||'var(--accent2)'};">${getMemberName(t.to)[0].toUpperCase()}</div>
          </div>
        </div>
        <button class="btn btn-success" onclick="markPaid('${t.from}','${t.to}',${t.amount})">✅ Mark as Paid</button>
      </div>`).join('');
}

function markPaid(from, to, amount) {
  const g = getGroup(); if (!g) return;
  if (!g.settlements) g.settlements = [];
  g.settlements.push({ id:'s'+Date.now(), from, to, amount, date: new Date().toISOString().split('T')[0] });
  saveState();
  notify('Settlement recorded! ✅');
  renderSettle();
}

// ===================== UTILS =====================
function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ===================== INIT =====================
loadState();
initEmojiPicker();
// Render the current page
const startPage = state.activePage || 'home';
document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
document.getElementById('page-' + startPage)?.classList.add('active');
renderPage(startPage);
</script>
